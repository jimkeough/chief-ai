# Updates-as-proposals: for CLONES/FORKS of Chief, this workflow checks the
# upstream repo weekly and PREPARES an update in YOUR repo when upstream main
# has moved — the trust contract applied to the app's own evolution: nothing
# lands until you review and merge. It no-ops on the upstream repo itself.
#
# The reliable half of this job is PUSHING the `chief/upstream-update` branch.
# Auto-opening the PR is best-effort: GitHub gates a workflow's ability to open
# PRs (Settings > Actions > "Allow GitHub Actions to create and approve pull
# requests"), and that gate can misfire even when enabled — so a failed
# auto-open is a warning, NOT a job failure. Either way Chief → Config →
# Software updates gives you a one-tap "Review & merge" link to the pushed
# branch (a PR you open yourself is never gated). Merging deploys the update.
#
# Security releases arrive the same way — merge promptly when a PR mentions one.

name: Upstream updates

on:
  schedule:
    - cron: "17 9 * * 1" # weekly, Monday 09:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  UPSTREAM: jimkeough/chief-ai

jobs:
  check:
    # Never run on the upstream repo itself.
    if: github.repository != 'jimkeough/chief-ai'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream "https://github.com/${UPSTREAM}.git"
          git fetch upstream main

      - name: Check for new commits
        id: diff
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Behind upstream by $BEHIND commit(s)."

      - name: Create update branch
        if: steps.diff.outputs.behind != '0'
        run: |
          git config user.name "chief-updates[bot]"
          git config user.email "noreply@github.com"
          git checkout -B chief/upstream-update
          # Take upstream's version on any overlap. Vercel's deploy-button clone
          # does NOT share git history with upstream, so a plain merge refuses
          # ("unrelated histories"); --allow-unrelated-histories + -X theirs lets
          # the first update apply cleanly (later updates are ordinary merges,
          # since upstream becomes an ancestor once this merges). User code edits
          # are discouraged — config lives in the DB — so favoring upstream is
          # the right call. The abort can't itself fail the job (|| true).
          git merge --no-edit --allow-unrelated-histories -X theirs upstream/main || {
            echo "MERGE_CONFLICT=1" >> "$GITHUB_ENV"
            git merge --abort 2>/dev/null || true
          }

      - name: Strip workflow-file changes
        if: steps.diff.outputs.behind != '0' && env.MERGE_CONFLICT != '1'
        run: |
          # The default GITHUB_TOKEN can NEVER create or update files under
          # .github/workflows/ — a hard, unconfigurable GitHub restriction (no
          # permissions: key grants it; it exists so a workflow can't rewrite
          # other workflows to escalate itself). Pushing a branch that touches
          # that path is unconditionally rejected. So: drop any such changes
          # from this merge before pushing. upstream-updates.yml itself is
          # updated through the separate "Enable auto-updates" / "re-commit
          # the workflow" link in Config instead (the user pushes that one as
          # themselves, which isn't subject to this restriction).
          CHANGED=$(git diff --name-only HEAD^1 HEAD -- .github/workflows/ || true)
          if [ -n "$CHANGED" ]; then
            echo "Excluding upstream workflow-file changes from this PR:"
            echo "$CHANGED"
            echo "$CHANGED" | while IFS= read -r f; do
              if git cat-file -e "HEAD^1:$f" 2>/dev/null; then
                git checkout HEAD^1 -- "$f"
              else
                git rm -f "$f" >/dev/null 2>&1 || rm -f "$f"
              fi
            done
            git add -A .github/workflows/
            git commit --amend --no-edit
          fi

      - name: Push and open PR
        if: steps.diff.outputs.behind != '0' && env.MERGE_CONFLICT != '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git push -f origin chief/upstream-update || {
            echo "::error::Push denied — check Settings > Actions > General > Workflow permissions: 'Read and write permissions' must be selected. (Changes under .github/workflows/ are already stripped from this branch, so this shouldn't be the old 'workflows permission' error.)"
            exit 1
          }
          gh pr list --head chief/upstream-update --state open --json number \
            --jq 'length' | grep -q '^0$' || exit 0
          # Best-effort: try to open the PR, but NEVER fail the job if we can't.
          # The branch is pushed and ready; Chief's Software-updates card links
          # straight to it ("Review & merge"), and a PR you open yourself is
          # never subject to the Actions gate. A red X here would be misleading.
          gh pr create \
            --title "Chief update: ${{ steps.diff.outputs.behind }} new upstream commit(s)" \
            --body "Upstream Chief has moved. Review the diff — new migrations are listed under \`supabase/migrations/\` and must be run after merging. Nothing changes until you merge this. Compare: https://github.com/${UPSTREAM}/compare/. Note: any changes to files under \`.github/workflows/\` are excluded from this PR (GitHub Actions can never push those) — check upstream separately if you rely on other CI workflows." \
            --base main --head chief/upstream-update \
            && echo "Opened update PR." \
            || echo "::warning::Branch \`chief/upstream-update\` is pushed and ready, but auto-opening the PR didn't succeed (GitHub gates this, and it can misfire even when enabled). Open it in one tap from Chief → Config → Software updates → Review & merge — a PR you open yourself is never gated."

      - name: Open conflict issue instead
        if: env.MERGE_CONFLICT == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --search "Upstream update conflict in:title" --state open --json number --jq 'length' | grep -q '^0$' || exit 0
          gh issue create \
            --title "Upstream update conflict" \
            --body "An upstream Chief update couldn't be merged automatically because of local changes. Merge https://github.com/${UPSTREAM} main into your repo manually." || {
            echo "::error::Couldn't open the conflict issue — check that GitHub Actions has issue-write access under Settings > Actions > General > Workflow permissions."
            exit 1
          }
