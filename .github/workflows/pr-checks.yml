name: PR checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate release files (version format, lockfile + updater sync)
        run: npm run release:check

      - run: npm ci

      - run: npm run typecheck
