name: PR checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Require a new synchronized release version
        run: npm run release:check -- "origin/${{ github.base_ref }}"

      - run: npm ci

      - run: npm run typecheck
